<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Triple Match Pro + Editor</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --bg-start: #0f2027;
      --bg-end: #2c5364;
      --container-bg: rgba(255,255,255,0.07);
      --text: #e0f7fa;
      --btn: #ff6d00;
      --btn-hover: #ff3d00;
      --selected: #ffeb3b;
    }
    body[data-theme="light"] {
      --bg-start: #e3f2fd; --bg-end: #bbdefb;
      --container-bg: rgba(0,0,0,0.04);
      --text: #0d47a1;
      --btn: #1976d2; --btn-hover: #1565c0;
      --selected: #fbc02d;
    }
    body[data-theme="ocean"] {
      --bg-start: #01579b; --bg-end: #0277bd;
      --container-bg: rgba(255,255,255,0.12);
      --text: #e1f5fe;
      --btn: #00acc1; --btn-hover: #00838f;
      --selected: #fff176;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
    }
    #ui { position: absolute; top: 0; left: 0; right: 0; padding: 10px 15px; background: rgba(0,0,0,0.45); display: flex; justify-content: space-between; z-index: 20; font-size: 1.1rem; }
    #game-container {
      position: relative;
      width: 96vw;
      max-width: 580px;
      height: 60vh;
      margin: 70px auto 100px;
      background: var(--container-bg);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 15px 45px rgba(0,0,0,0.55);
    }
    .tile {
      position: absolute;
      width: 68px;
      height: 68px;
      background-size: 92%;
      background-repeat: no-repeat;
      background-position: center;
      cursor: pointer;
      transition: transform 0.18s, opacity 0.45s, box-shadow 0.18s;
      pointer-events: auto;
      user-select: none;
      border-radius: 10px;
    }
    .tile.disabled { pointer-events: none; opacity: 0.38; filter: grayscale(50%) brightness(0.9); }
    .tile.selected { transform: scale(1.22); box-shadow: 0 0 28px var(--selected); border: 3px solid var(--selected); }
    #selected { position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%); display: flex; gap: 16px; z-index: 15; }
    .sel-tile { width: 78px; height: 78px; background-size: contain; border: 4px solid #81c784; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    #message { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; font-weight: bold; text-shadow: 0 0 24px black; opacity: 0; transition: opacity 0.8s; z-index: 10; }
    .btn { padding: 10px 20px; background: var(--btn); color: white; border: none; border-radius: 12px; font-size: 1.05rem; cursor: pointer; margin: 4px; transition: all 0.2s; }
    .btn:hover { background: var(--btn-hover); transform: translateY(-2px); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #editor-tools { position: fixed; bottom: 180px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.65); padding: 12px 20px; border-radius: 14px; display: none; flex-wrap: wrap; gap: 12px; z-index: 25; justify-content: center; }
    #sound-controls { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 12px; display: flex; align-items: center; gap: 12px; z-index: 20; }
    #volume { width: 120px; }
  </style>
</head>
<body data-theme="dark">

<div id="ui">
  <div>লেভেল: <span id="level">1</span></div>
  <div>সময়: <span id="timer">00:00</span></div>
  <div>মুভ: <span id="moves">0</span></div>
</div>

<div id="game-container"></div>

<div id="selected"></div>
<div id="message"></div>

<div style="position:fixed; bottom:60px; left:50%; transform:translateX(-50%); display:flex; flex-wrap:wrap; justify-content:center; gap:10px; z-index:22;">
  <button class="btn" onclick="undo()">Undo</button>
  <button class="btn" onclick="hint()">Hint</button>
  <button class="btn" onclick="shuffle()">Shuffle</button>
  <button class="btn" onclick="toggleEditor()">Editor মোড</button>
  <button class="btn" id="export-btn" onclick="exportLayout()" style="display:none;">Export JSON</button>
  <button class="btn" onclick="nextLevel()">পরের লেভেল</button>
</div>

<div id="editor-tools">
  <select id="editor-type">
    <option value="0">Cherry</option>
    <option value="1">Lemon</option>
    <option value="2">Strawberry</option>
    <option value="3">Watermelon</option>
    <option value="4">Grapes</option>
    <option value="5">Banana</option>
    <option value="6">Pineapple</option>
    <option value="7">Mango</option>
  </select>
  <button class="btn" onclick="addNewTile()">+ Add Tile</button>
  <button class="btn" onclick="clearLevelForEdit()">Clear All</button>
</div>

<div id="sound-controls">
  <label>ভলিউম:</label>
  <input type="range" id="volume" min="0" max="1" step="0.05" value="0.7">
  <button class="btn" onclick="toggleMute()" style="padding:6px 12px; font-size:0.95rem;">Mute</button>
</div>

<audio id="sndMatch" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-2004.mp3"></audio>
<audio id="sndWin" src="https://assets.mixkit.co/sfx/preview/mixkit-game-level-completed-2053.mp3"></audio>

<script>
// ================================================
const container = document.getElementById('game-container');
const selectedDiv = document.getElementById('selected');
const msg = document.getElementById('message');
const levelSpan = document.getElementById('level');
const timerSpan = document.getElementById('timer');
const movesSpan = document.getElementById('moves');
const editorTools = document.getElementById('editor-tools');
const exportBtn = document.getElementById('export-btn');
const volumeSlider = document.getElementById('volume');

const sndMatch = document.getElementById('sndMatch');
const sndWin   = document.getElementById('sndWin');

const tileImages = [
  'https://img.icons8.com/emoji/96/cherries-emoji.png',
  'https://img.icons8.com/emoji/96/lemon-emoji.png',
  'https://img.icons8.com/emoji/96/strawberry-emoji.png',
  'https://img.icons8.com/emoji/96/watermelon-emoji.png',
  'https://img.icons8.com/emoji/96/grapes-emoji.png',
  'https://img.icons8.com/emoji/96/banana-emoji.png',
  'https://img.icons8.com/emoji/96/pineapple-emoji.png',
  'https://img.icons8.com/emoji/96/mango-emoji.png'
];

const levels = [
  { id:1, time:150, moves:50, tiles: [
    {x:80,  y:60,  z:1, type:0}, {x:100, y:70,  z:2, type:0}, {x:120, y:80,  z:3, type:0},
    {x:200, y:100, z:4, type:1}, {x:220, y:110, z:3, type:1}, {x:240, y:120, z:2, type:1},
    {x:320, y:180, z:5, type:2}, {x:340, y:190, z:4, type:2}, {x:360, y:200, z:3, type:2},
    {x:140, y:240, z:2, type:3}, {x:160, y:250, z:3, type:3}, {x:180, y:260, z:4, type:3},
    {x:280, y:280, z:1, type:4}, {x:300, y:290, z:2, type:4}, {x:320, y:300, z:3, type:4},
    {x:60,  y:320, z:3, type:5}, {x:80,  y:330, z:4, type:5}, {x:100, y:340, z:5, type:5},
    {x:400, y:140, z:2, type:6}, {x:420, y:150, z:3, type:6}, {x:440, y:160, z:4, type:6},
    {x:180, y:380, z:1, type:7}, {x:200, y:390, z:2, type:7}, {x:220, y:400, z:3, type:7},
    {x:340, y:60,  z:4, type:0}, {x:360, y:70,  z:5, type:0}, {x:380, y:80,  z:6, type:0},
    {x:260, y:220, z:3, type:1}, {x:280, y:230, z:4, type:1}, {x:300, y:240, z:5, type:1},
    // আরও যোগ করতে পারো — মোট \~৩০–৪৫ টাইল
  ]},
  { id:2, time:180, moves:60, tiles: [
    // আরও জটিল লেআউট — নিজে অ্যাডজাস্ট করো
    {x:100,y:80,z:1,type:2}, {x:120,y:90,z:2,type:2}, {x:140,y:100,z:3,type:2},
    {x:240,y:120,z:4,type:3}, {x:260,y:130,z:3,type:3}, {x:280,y:140,z:2,type:3},
    // ... আরও ৩০+ টাইল যোগ করো
  ]},
  { id:3, time:210, moves:70, tiles: [
    // লেভেল ৩ — আরও কঠিন
    // ...
  ]}
];

let currentLevel = parseInt(localStorage.getItem('tripleMatchLevel') || '0');
let tiles = [];
let selected = [];
let history = [];
let moves = 0;
let timeLeft = 0;
let timerId = null;
let isEditorMode = false;
let draggingTile = null;
let isMuted = false;

volumeSlider.addEventListener('input', () => {
  sndMatch.volume = volumeSlider.value;
  sndWin.volume   = volumeSlider.value;
});

function toggleMute() {
  isMuted = !isMuted;
  sndMatch.muted = isMuted;
  sndWin.muted   = isMuted;
  volumeSlider.disabled = isMuted;
}

// ────────────────────────────────────────────────
// বাকি ফাংশনগুলো (rectOverlap, isBlocked, updateClickable, showMessage, createTile ইত্যাদি) আগের কোডের মতোই রাখা আছে
// শুধু নতুন ফিচার যোগ করা হয়েছে নিচে

function snapToGrid(val) {
  return Math.round(val / 64) * 64;
}

function addNewTile() {
  if (!isEditorMode) return;
  const type = parseInt(document.getElementById('editor-type').value);
  const x = snapToGrid(200 + Math.random() * 200);
  const y = snapToGrid(100 + Math.random() * 200);
  const z = Math.floor(Math.random() * 6) + 1;
  createTile(x, y, z, type, true);
  updateClickable();
}

function clearLevelForEdit() {
  if (!confirm("সব টাইল মুছে ফেলব?")) return;
  container.innerHTML = '';
  tiles = [];
}

container.addEventListener('dragover', e => e.preventDefault());
container.addEventListener('drop', e => {
  if (!isEditorMode || !draggingTile) return;
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  let newX = e.clientX - rect.left - 34;
  let newY = e.clientY - rect.top - 34;
  draggingTile.x = snapToGrid(newX);
  draggingTile.y = snapToGrid(newY);
  draggingTile.elem.style.left = draggingTile.x + 'px';
  draggingTile.elem.style.top  = draggingTile.y + 'px';
  draggingTile = null;
  updateClickable();
});

// থিম সুইচ (উদাহরণ — তুমি UI-তে বাটন যোগ করতে পারো)
function setTheme(theme) {
  document.body.dataset.theme = theme;
}

// Start
sndMatch.volume = 0.7;
sndWin.volume   = 0.7;
loadLevel(currentLevel);   // loadLevel ফাংশন আগের কোড থেকে কপি করো

// থিম চেঞ্জ উদাহরণ (চাইলে UI-তে বাটন যোগ করো)
setTheme('dark'); // default
// setTheme('light'); // অথবা 'ocean'
</script>
</body>
</html>
