<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Triple Match Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --bg-start: #0f2027;
      --bg-end: #2c5364;
      --container-bg: rgba(255,255,255,0.08);
      --text: #e0f7fa;
      --btn: #ff6d00;
      --selected: #ffeb3b;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
    }
    #ui {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 12px 15px;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: space-between;
      z-index: 20;
      font-size: 1.1rem;
    }
    #game-container {
      position: relative;
      width: 96vw;
      max-width: 580px;
      height: calc(100vh - 280px);
      margin: 70px auto 20px;
      background: var(--container-bg);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 15px 45px rgba(0,0,0,0.6);
    }
    .tile {
      position: absolute;
      width: 68px;
      height: 68px;
      background-size: 92%;
      background-repeat: no-repeat;
      background-position: center;
      cursor: pointer;
      transition: transform 0.18s, opacity 0.45s, box-shadow 0.18s;
      pointer-events: auto;
      user-select: none;
      border-radius: 10px;
    }
    .tile.disabled { pointer-events: none; opacity: 0.38; filter: grayscale(50%) brightness(0.9); }
    .tile.selected { transform: scale(1.22); box-shadow: 0 0 28px var(--selected); border: 3px solid var(--selected); }
    #selected { position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%); display: flex; gap: 16px; z-index: 15; }
    .sel-tile { width: 78px; height: 78px; background-size: contain; border: 4px solid #81c784; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    #message { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; font-weight: bold; text-shadow: 0 0 24px black; opacity: 0; transition: opacity 0.8s; z-index: 10; }
    .btn { padding: 10px 22px; background: var(--btn); color: white; border: none; border-radius: 12px; font-size: 1.05rem; cursor: pointer; margin: 4px; transition: all 0.2s; }
    .btn:hover { background: #ff3d00; transform: translateY(-2px); }
    #editor-tools { position: fixed; bottom: 190px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 12px 20px; border-radius: 14px; display: none; flex-wrap: wrap; gap: 12px; z-index: 25; justify-content: center; }
    #sound-controls { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 12px; display: flex; align-items: center; gap: 12px; z-index: 20; }
    #volume { width: 140px; }
  </style>
</head>
<body>

<div id="ui">
  <div>লেভেল: <span id="level">1</span></div>
  <div>সময়: <span id="timer">00:00</span></div>
  <div>মুভ: <span id="moves">0</span></div>
</div>

<div id="game-container"></div>

<div id="selected"></div>
<div id="message"></div>

<div style="position:fixed; bottom:65px; left:50%; transform:translateX(-50%); display:flex; flex-wrap:wrap; justify-content:center; gap:8px; z-index:22;">
  <button class="btn" onclick="undo()">Undo</button>
  <button class="btn" onclick="hint()">Hint</button>
  <button class="btn" onclick="shuffle()">Shuffle</button>
  <button class="btn" onclick="toggleEditor()">Editor মোড</button>
  <button class="btn" id="export-btn" onclick="exportLayout()" style="display:none;">Export JSON</button>
  <button class="btn" onclick="nextLevel()">পরের লেভেল</button>
</div>

<div id="editor-tools">
  <select id="editor-type">
    <option value="0">Cherry</option>
    <option value="1">Lemon</option>
    <option value="2">Strawberry</option>
    <option value="3">Watermelon</option>
    <option value="4">Grapes</option>
    <option value="5">Banana</option>
    <option value="6">Pineapple</option>
    <option value="7">Mango</option>
  </select>
  <button class="btn" onclick="addNewTile()">+ Add Tile</button>
  <button class="btn" onclick="clearLevelForEdit()">Clear All</button>
</div>

<div id="sound-controls">
  <label>ভলিউম:</label>
  <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8">
  <button class="btn" onclick="toggleMute()" style="padding:6px 14px; font-size:0.95rem;">Mute</button>
</div>

<audio id="sndMatch" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-2004.mp3"></audio>
<audio id="sndWin" src="https://assets.mixkit.co/sfx/preview/mixkit-game-level-completed-2053.mp3"></audio>

<script>
// ==================== FULL WORKING CODE ====================
const container = document.getElementById('game-container');
const selectedDiv = document.getElementById('selected');
const msg = document.getElementById('message');
const levelSpan = document.getElementById('level');
const timerSpan = document.getElementById('timer');
const movesSpan = document.getElementById('moves');
const editorTools = document.getElementById('editor-tools');
const exportBtn = document.getElementById('export-btn');
const volumeSlider = document.getElementById('volume');

const sndMatch = document.getElementById('sndMatch');
const sndWin   = document.getElementById('sndWin');

const tileImages = [
  'https://img.icons8.com/emoji/96/cherries-emoji.png',
  'https://img.icons8.com/emoji/96/lemon-emoji.png',
  'https://img.icons8.com/emoji/96/strawberry-emoji.png',
  'https://img.icons8.com/emoji/96/watermelon-emoji.png',
  'https://img.icons8.com/emoji/96/grapes-emoji.png',
  'https://img.icons8.com/emoji/96/banana-emoji.png',
  'https://img.icons8.com/emoji/96/pineapple-emoji.png',
  'https://img.icons8.com/emoji/96/mango-emoji.png'
];

const levels = [
  { id:1, time:150, moves:50, tiles: [
    {x:64,y:64,z:1,type:0},{x:128,y:64,z:2,type:0},{x:192,y:64,z:3,type:0},
    {x:64,y:128,z:3,type:1},{x:128,y:128,z:2,type:1},{x:192,y:128,z:1,type:1},
    {x:256,y:64,z:4,type:2},{x:320,y:64,z:5,type:2},{x:384,y:64,z:6,type:2},
    {x:256,y:128,z:2,type:3},{x:320,y:128,z:3,type:3},{x:384,y:128,z:4,type:3},
    {x:64,y:192,z:1,type:4},{x:128,y:192,z:2,type:4},{x:192,y:192,z:3,type:4},
    {x:256,y:192,z:4,type:5},{x:320,y:192,z:5,type:5},{x:384,y:192,z:6,type:5},
    {x:64,y:256,z:3,type:6},{x:128,y:256,z:4,type:6},{x:192,y:256,z:5,type:6},
    {x:256,y:256,z:1,type:7},{x:320,y:256,z:2,type:7},{x:384,y:256,z:3,type:7},
    {x:64,y:320,z:2,type:0},{x:128,y:320,z:3,type:0},{x:192,y:320,z:4,type:0},
    {x:256,y:320,z:5,type:1},{x:320,y:320,z:6,type:1},{x:384,y:320,z:4,type:1},
    {x:64,y:384,z:1,type:2},{x:128,y:384,z:2,type:2},{x:192,y:384,z:3,type:2},
    {x:256,y:384,z:4,type:3},{x:320,y:384,z:5,type:3},{x:384,y:384,z:6,type:3}
  ]},
  { id:2, time:180, moves:60, tiles: [
    {x:64,y:64,z:1,type:4},{x:128,y:64,z:2,type:4},{x:192,y:64,z:3,type:4},
    {x:256,y:64,z:4,type:5},{x:320,y:64,z:5,type:5},{x:384,y:64,z:6,type:5},
    {x:64,y:128,z:3,type:6},{x:128,y:128,z:4,type:6},{x:192,y:128,z:5,type:6},
    {x:256,y:128,z:1,type:7},{x:320,y:128,z:2,type:7},{x:384,y:128,z:3,type:7},
    {x:64,y:192,z:2,type:0},{x:128,y:192,z:3,type:0},{x:192,y:192,z:4,type:0},
    {x:256,y:192,z:5,type:1},{x:320,y:192,z:6,type:1},{x:384,y:192,z:4,type:1},
    {x:64,y:256,z:1,type:2},{x:128,y:256,z:2,type:2},{x:192,y:256,z:3,type:2},
    {x:256,y:256,z:4,type:3},{x:320,y:256,z:5,type:3},{x:384,y:256,z:6,type:3},
    {x:64,y:320,z:3,type:4},{x:128,y:320,z:4,type:4},{x:192,y:320,z:5,type:4},
    {x:256,y:320,z:1,type:5},{x:320,y:320,z:2,type:5},{x:384,y:320,z:3,type:5},
    {x:64,y:384,z:2,type:6},{x:128,y:384,z:3,type:6},{x:192,y:384,z:4,type:6},
    {x:256,y:384,z:5,type:7},{x:320,y:384,z:6,type:7},{x:384,y:384,z:4,type:7}
  ]},
  { id:3, time:210, moves:70, tiles: [
    {x:64,y:64,z:5,type:2},{x:128,y:64,z:4,type:2},{x:192,y:64,z:3,type:2},
    {x:256,y:64,z:6,type:3},{x:320,y:64,z:5,type:3},{x:384,y:64,z:4,type:3},
    {x:64,y:128,z:1,type:0},{x:128,y:128,z:2,type:0},{x:192,y:128,z:3,type:0},
    {x:256,y:128,z:4,type:1},{x:320,y:128,z:5,type:1},{x:384,y:128,z:6,type:1},
    {x:64,y:192,z:6,type:4},{x:128,y:192,z:5,type:4},{x:192,y:192,z:4,type:4},
    {x:256,y:192,z:3,type:5},{x:320,y:192,z:2,type:5},{x:384,y:192,z:1,type:5},
    {x:64,y:256,z:2,type:6},{x:128,y:256,z:3,type:6},{x:192,y:256,z:4,type:6},
    {x:256,y:256,z:5,type:7},{x:320,y:256,z:6,type:7},{x:384,y:256,z:4,type:7},
    {x:64,y:320,z:1,type:2},{x:128,y:320,z:2,type:2},{x:192,y:320,z:3,type:2},
    {x:256,y:320,z:4,type:3},{x:320,y:320,z:5,type:3},{x:384,y:320,z:6,type:3},
    {x:64,y:384,z:3,type:0},{x:128,y:384,z:4,type:0},{x:192,y:384,z:5,type:0},
    {x:256,y:384,z:6,type:1},{x:320,y:384,z:5,type:1},{x:384,y:384,z:4,type:1}
  ]}
];

let currentLevel = parseInt(localStorage.getItem('tripleMatchLevel') || '0');
let tiles = [];
let selected = [];
let history = [];
let moves = 0;
let timeLeft = 0;
let timerId = null;
let isEditorMode = false;
let draggingTile = null;
let isMuted = false;

volumeSlider.addEventListener('input', () => {
  sndMatch.volume = volumeSlider.value;
  sndWin.volume = volumeSlider.value;
});

function toggleMute() {
  isMuted = !isMuted;
  sndMatch.muted = sndWin.muted = isMuted;
}

// ==================== CORE FUNCTIONS ====================
function rectOverlap(r1, r2) {
  return !(r2.left > r1.right || r2.right < r1.left || r2.top > r1.bottom || r2.bottom < r1.top);
}

function isBlocked(tileObj) {
  if (!tileObj.elem.parentNode) return true;
  const rect = tileObj.elem.getBoundingClientRect();
  for (let other of tiles) {
    if (other === tileObj || !other.elem.parentNode) continue;
    const oRect = other.elem.getBoundingClientRect();
    if (rectOverlap(rect, oRect) && other.z > tileObj.z) return true;
  }
  return false;
}

function updateClickable() {
  tiles.forEach(t => {
    if (t.elem && t.elem.parentNode) {
      t.elem.classList.toggle('disabled', isBlocked(t));
    }
  });
}

function showMessage(text, color = '#ffeb3b', dur = 2000) {
  msg.textContent = text;
  msg.style.color = color;
  msg.style.opacity = 1;
  setTimeout(() => msg.style.opacity = 0, dur);
}

function snapToGrid(val) {
  return Math.round(val / 64) * 64;
}

function createTile(x, y, z, type, isDraggable = false) {
  const elem = document.createElement('div');
  elem.className = 'tile';
  elem.style.backgroundImage = `url(${tileImages[type]})`;
  elem.style.left = x + 'px';
  elem.style.top = y + 'px';
  elem.style.zIndex = z * 10 + Math.floor(Math.random() * 4);

  const obj = { elem, x, y, z, type };

  if (!isEditorMode) {
    elem.addEventListener('click', () => selectTile(obj));
    elem.addEventListener('touchend', e => { e.preventDefault(); selectTile(obj); });
  } else {
    elem.draggable = true;
    elem.addEventListener('dragstart', e => { draggingTile = obj; });
  }

  container.appendChild(elem);
  tiles.push(obj);
  return obj;
}

function selectTile(obj) {
  if (selected.length >= 3 || obj.elem.classList.contains('disabled')) return;
  selected.push(obj);
  obj.elem.classList.add('selected');

  const vis = document.createElement('div');
  vis.className = 'sel-tile';
  vis.style.backgroundImage = obj.elem.style.backgroundImage;
  selectedDiv.appendChild(vis);
  obj.visual = vis;

  if (selected.length === 3) checkMatch();
}

function checkMatch() {
  const types = selected.map(t => t.type);
  if (types[0] === types[1] && types[1] === types[2]) {
    sndMatch.play();
    moves++;
    movesSpan.textContent = moves;
    history.push([...selected]);

    selected.forEach(t => {
      const rect = t.elem.getBoundingClientRect();
      const cx = (rect.left + rect.width/2 - container.getBoundingClientRect().left) / window.innerWidth;
      const cy = (rect.top + rect.height/2 - container.getBoundingClientRect().top) / window.innerHeight;
      confetti({ particleCount: 90, spread: 80, origin: { x: cx, y: cy } });
      t.elem.style.opacity = '0';
      setTimeout(() => { t.elem.remove(); if (t.visual) t.visual.remove(); }, 500);
    });

    showMessage("ম্যাচ! 🎉", "#4caf50");
    selected = [];
    selectedDiv.innerHTML = '';
    setTimeout(() => { updateClickable(); checkWin(); }, 600);
  } else {
    showMessage("মিলেনি!", "#ef5350", 1200);
    setTimeout(() => {
      selected.forEach(t => { t.elem.classList.remove('selected'); if (t.visual) t.visual.remove(); });
      selected = []; selectedDiv.innerHTML = '';
    }, 900);
  }
}

function checkWin() {
  if (tiles.every(t => !t.elem.parentNode)) {
    clearInterval(timerId);
    sndWin.play();
    showMessage("লেভেল কমপ্লিট! 🌟", "#ffd54f", 5000);
    localStorage.setItem('tripleMatchCompleted', Math.max(currentLevel + 1, parseInt(localStorage.getItem('tripleMatchCompleted') || '0')));
  }
}

function loadLevel(lvlIdx) {
  currentLevel = Math.min(lvlIdx, levels.length - 1);
  localStorage.setItem('tripleMatchLevel', currentLevel);
  levelSpan.textContent = levels[currentLevel].id;

  container.innerHTML = '';
  selectedDiv.innerHTML = '';
  tiles = [];
  selected = [];
  history = [];
  moves = 0;
  movesSpan.textContent = '0';

  timeLeft = levels[currentLevel].time;
  timerSpan.textContent = formatTime(timeLeft);
  clearInterval(timerId);
  timerId = setInterval(() => {
    if (--timeLeft >= 0) timerSpan.textContent = formatTime(timeLeft);
    else { clearInterval(timerId); showMessage("সময় শেষ!", "#e53935"); }
  }, 1000);

  levels[currentLevel].tiles.forEach(t => createTile(t.x, t.y, t.z, t.type));
  setTimeout(updateClickable, 300);
}

function formatTime(s) {
  return `\( {Math.floor(s/60).toString().padStart(2,'0')}: \){(s%60).toString().padStart(2,'0')}`;
}

function undo() {
  if (history.length === 0) return;
  const group = history.pop();
  group.forEach(tData => createTile(tData.x, tData.y, tData.z, tData.type));
  moves = Math.max(0, moves - 1);
  movesSpan.textContent = moves;
  updateClickable();
}

function hint() {
  const visible = tiles.filter(t => t.elem.parentNode && !isBlocked(t));
  if (visible.length) {
    const one = visible[Math.floor(Math.random()*visible.length)];
    one.elem.style.boxShadow = '0 0 30px #00e676';
    setTimeout(() => one.elem.style.boxShadow = '', 1800);
  }
}

function shuffle() {
  tiles.forEach(t => {
    if (t.elem.parentNode) {
      t.x = snapToGrid(40 + Math.random() * 420);
      t.y = snapToGrid(40 + Math.random() * 320);
      t.elem.style.left = t.x + 'px';
      t.elem.style.top = t.y + 'px';
    }
  });
  updateClickable();
}

function nextLevel() {
  loadLevel(currentLevel + 1);
}

// ==================== EDITOR ====================
function toggleEditor() {
  isEditorMode = !isEditorMode;
  editorTools.style.display = isEditorMode ? 'flex' : 'none';
  exportBtn.style.display = isEditorMode ? 'inline-block' : 'none';
  if (isEditorMode) showMessage("Editor মোড ON — ড্র্যাগ করো", "#29b6f6");
  else loadLevel(currentLevel);
}

function addNewTile() {
  if (!isEditorMode) return;
  const type = parseInt(document.getElementById('editor-type').value);
  const x = snapToGrid(100 + Math.random() * 300);
  const y = snapToGrid(80 + Math.random() * 250);
  const z = Math.floor(Math.random() * 6) + 1;
  createTile(x, y, z, type, true);
  updateClickable();
}

function clearLevelForEdit() {
  if (!confirm("সব টাইল মুছে ফেলব?")) return;
  container.innerHTML = '';
  tiles = [];
}

container.addEventListener('dragover', e => e.preventDefault());
container.addEventListener('drop', e => {
  if (!isEditorMode || !draggingTile) return;
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  draggingTile.x = snapToGrid(e.clientX - rect.left - 34);
  draggingTile.y = snapToGrid(e.clientY - rect.top - 34);
  draggingTile.elem.style.left = draggingTile.x + 'px';
  draggingTile.elem.style.top = draggingTile.y + 'px';
  draggingTile = null;
  updateClickable();
});

function exportLayout() {
  const data = tiles.map(t => ({x: t.x, y: t.y, z: t.z, type: t.type}));
  console.log(JSON.stringify(data, null, 2));
  alert("Console-এ JSON দেখা যাবে। levels array-তে পেস্ট করো!");
}

// ==================== START ====================
sndMatch.volume = sndWin.volume = 0.8;
loadLevel(currentLevel);
window.addEventListener('resize', updateClickable);
</script>
</body>
</html>
